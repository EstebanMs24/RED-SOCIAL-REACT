<!DOCTYPE html>
<html lang="es">
<head>
  <title>Registro · RedSocial</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
  <link rel="stylesheet" href="https://www.w3schools.com/lib/w3-theme-blue-grey.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    html, body, h1, h2, h3, h4, h5 { font-family: "Open Sans", sans-serif; }
    body { background-color: #f1f1f1; }
  </style>
</head>
<body class="w3-theme-l5">

<!-- Navbar -->
<div class="w3-top">
  <div class="w3-bar w3-theme-d2 w3-left-align w3-large">
    <a class="w3-bar-item w3-button w3-hide-medium w3-hide-large w3-right w3-padding-large w3-hover-white w3-large w3-theme-d2" href="javascript:void(0);" onclick="openNav()"><i class="fa fa-bars"></i></a>
    <a href="plantilla-RedSocial.html" class="w3-bar-item w3-button w3-padding-large w3-theme-d4"><i class="fa fa-home w3-margin-right"></i>Logo</a>
    <a href="login.html" class="w3-bar-item w3-button w3-hide-small w3-padding-large w3-hover-white"><i class="fa fa-sign-in"></i> Iniciar sesión</a>
    <a href="register.html" class="w3-bar-item w3-button w3-hide-small w3-padding-large w3-hover-white"><i class="fa fa-user-plus"></i> Registrarse</a>
  </div>
</div>

<div id="navDemo" class="w3-bar-block w3-theme-d2 w3-hide w3-hide-large w3-hide-medium w3-large">
  <a href="plantilla-RedSocial.html" class="w3-bar-item w3-button w3-padding-large">Inicio</a>
  <a href="login.html" class="w3-bar-item w3-button w3-padding-large">Iniciar sesión</a>
  <a href="register.html" class="w3-bar-item w3-button w3-padding-large">Registrarse</a>
</div>

<!-- Contenido -->
<div class="w3-container w3-content" style="max-width:600px; margin-top:100px;">
  <div class="w3-card-4 w3-round-xlarge w3-white">
    <div class="w3-container w3-theme-d2 w3-round-xlarge w3-padding-16">
      <h2 class="w3-center">Crear cuenta</h2>
    </div>
    <form class="w3-container w3-padding-24" action="plantilla-RedSocial.html" method="get">
      <div class="w3-section">
        <label><i class="fa fa-user"></i> Nombre completo</label>
        <input class="w3-input w3-border w3-round" type="text" placeholder="Juan Pérez" required>
      </div>
      <div class="w3-section">
        <label><i class="fa fa-envelope"></i> Correo electrónico</label>
        <input class="w3-input w3-border w3-round" type="email" placeholder="tu@email.com" required>
      </div>
      <div class="w3-section">
        <label><i class="fa fa-lock"></i> Contraseña</label>
        <input class="w3-input w3-border w3-round" type="password" placeholder="********" required>
      </div>
      <div class="w3-section">
        <label><i class="fa fa-calendar"></i> Fecha de nacimiento</label>
        <input class="w3-input w3-border w3-round" type="date" value="1990-01-01">
      </div>
      <div class="w3-section">
        <label><i class="fa fa-venus-mars"></i> Género</label>
        <select class="w3-select w3-border w3-round">
          <option value="" disabled selected>Selecciona</option>
          <option>Hombre</option>
          <option>Mujer</option>
          <option>Otro</option>
        </select>
      </div>
      <div class="w3-section">
        <button class="w3-button w3-theme-d2 w3-round w3-block w3-section"><i class="fa fa-user-plus"></i> Registrarse</button>
      </div>
      <p class="w3-center">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>.</p>
    </form>
  </div>
</div>

<script>
function openNav() {
  var x = document.getElementById("navDemo");
  if (x.className.indexOf("w3-show") == -1) {
    x.className += " w3-show";
  } else {
    x.className = x.className.replace(" w3-show", "");
  }
}
</script>
</body>
</html>
