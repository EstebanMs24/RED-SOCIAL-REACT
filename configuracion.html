<!DOCTYPE html>
<html lang="es">
<head>
  <title>Configuración · RedSocial</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
  <link rel="stylesheet" href="https://www.w3schools.com/lib/w3-theme-blue-grey.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    html, body, h1, h2, h3, h4, h5 { font-family: "Open Sans", sans-serif; }
    .tablink { background-color: #f1f1f1; }
  </style>
</head>
<body class="w3-theme-l5">

<!-- Navbar -->
<div class="w3-top">
  <div class="w3-bar w3-theme-d2 w3-left-align w3-large">
    <a class="w3-bar-item w3-button w3-hide-medium w3-hide-large w3-right w3-padding-large w3-hover-white w3-large w3-theme-d2" href="javascript:void(0);" onclick="openNav()"><i class="fa fa-bars"></i></a>
    <a href="plantilla-RedSocial.html" class="w3-bar-item w3-button w3-padding-large w3-theme-d4"><i class="fa fa-home w3-margin-right"></i>Logo</a>
    <a href="profile.html" class="w3-bar-item w3-button w3-hide-small w3-padding-large w3-hover-white"><i class="fa fa-user"></i></a>
    <a href="messages.html" class="w3-bar-item w3-button w3-hide-small w3-padding-large w3-hover-white"><i class="fa fa-envelope"></i></a>
    <div class="w3-dropdown-hover w3-hide-small">
      <button class="w3-button w3-padding-large"><i class="fa fa-bell"></i><span class="w3-badge w3-right w3-small w3-green">3</span></button>
      <div class="w3-dropdown-content w3-card-4 w3-bar-block" style="width:300px">
        <a href="#" class="w3-bar-item w3-button">Una nueva solicitud de amistad</a>
        <a href="#" class="w3-bar-item w3-button">John Doe publicó en tu muro</a>
        <a href="#" class="w3-bar-item w3-button">Jane le gusta tu publicación</a>
      </div>
    </div>
    <a href="settings.html" class="w3-bar-item w3-button w3-hide-small w3-right w3-padding-large w3-hover-white"><i class="fa fa-cog"></i></a>
    <a href="#" class="w3-bar-item w3-button w3-hide-small w3-right w3-padding-large w3-hover-white">
      <img src="https://www.w3schools.com/w3images/avatar2.png" class="w3-circle" style="height:23px;width:23px" alt="Avatar">
    </a>
  </div>
</div>

<div id="navDemo" class="w3-bar-block w3-theme-d2 w3-hide w3-hide-large w3-hide-medium w3-large">
  <a href="plantilla-RedSocial.html" class="w3-bar-item w3-button w3-padding-large">Inicio</a>
  <a href="profile.html" class="w3-bar-item w3-button w3-padding-large">Perfil</a>
  <a href="messages.html" class="w3-bar-item w3-button w3-padding-large">Mensajes</a>
  <a href="settings.html" class="w3-bar-item w3-button w3-padding-large">Configuración</a>
</div>

<!-- Contenido -->
<div class="w3-container w3-content" style="max-width:1000px;margin-top:80px">
  <div class="w3-card w3-round w3-white">
    <div class="w3-container w3-padding-16 w3-theme-d2">
      <h2><i class="fa fa-cogs"></i> Configuración de la cuenta</h2>
    </div>

    <!-- Pestañas -->
    <div class="w3-bar w3-theme-l4">
      <button class="w3-bar-item w3-button tablink w3-theme-d1" onclick="openTab(event, 'General')">General</button>
      <button class="w3-bar-item w3-button tablink" onclick="openTab(event, 'Privacidad')">Privacidad</button>
      <button class="w3-bar-item w3-button tablink" onclick="openTab(event, 'Notificaciones')">Notificaciones</button>
    </div>

    <!-- Contenido de pestañas -->
    <div id="General" class="w3-container tab w3-padding-24">
      <h4>Información personal</h4>
      <div class="w3-section">
        <label>Nombre</label>
        <input class="w3-input w3-border w3-round" type="text" value="Juan Pérez">
      </div>
      <div class="w3-section">
        <label>Correo electrónico</label>
        <input class="w3-input w3-border w3-round" type="email" value="juan@email.com">
      </div>
      <div class="w3-section">
        <label>Biografía</label>
        <textarea class="w3-input w3-border w3-round" rows="3">Diseñador UI/UX. Amante del café.</textarea>
      </div>
      <button class="w3-button w3-theme-d2 w3-round"><i class="fa fa-save"></i> Guardar cambios</button>
    </div>

    <div id="Privacidad" class="w3-container tab w3-padding-24" style="display:none">
      <h4>Privacidad y seguridad</h4>
      <div class="w3-section">
        <label>¿Quién puede ver tu perfil?</label>
        <select class="w3-select w3-border w3-round">
          <option>Todos</option>
          <option selected>Solo amigos</option>
          <option>Solo yo</option>
        </select>
      </div>
      <div class="w3-section">
        <label>¿Quién puede enviarte solicitudes de amistad?</label>
        <select class="w3-select w3-border w3-round">
          <option>Todos</option>
          <option selected>Amigos de amigos</option>
        </select>
      </div>
      <div class="w3-section">
        <label>Cambiar contraseña</label>
        <input class="w3-input w3-border w3-round" type="password" placeholder="Nueva contraseña">
      </div>
      <button class="w3-button w3-theme-d2 w3-round"><i class="fa fa-lock"></i> Actualizar privacidad</button>
    </div>

    <div id="Notificaciones" class="w3-container tab w3-padding-24" style="display:none">
      <h4>Preferencias de notificaciones</h4>
      <div class="w3-section">
        <input class="w3-check" type="checkbox" checked> <label>Recibir notificaciones por correo</label>
      </div>
      <div class="w3-section">
        <input class="w3-check" type="checkbox" checked> <label>Notificaciones de nuevos mensajes</label>
      </div>
      <div class="w3-section">
        <input class="w3-check" type="checkbox"> <label>Notificaciones de cumpleaños</label>
      </div>
      <div class="w3-section">
        <input class="w3-check" type="checkbox" checked> <label>Notificaciones de grupos</label>
      </div>
      <button class="w3-button w3-theme-d2 w3-round"><i class="fa fa-bell"></i> Guardar preferencias</button>
    </div>
  </div>
</div>
<br>

<footer class="w3-container w3-theme-d3 w3-padding-16">
  <h5>RedSocial © 2025</h5>
</footer>

<script>
function openNav() {
  var x = document.getElementById("navDemo");
  if (x.className.indexOf("w3-show") == -1) {
    x.className += " w3-show";
  } else {
    x.className = x.className.replace(" w3-show", "");
  }
}

function openTab(evt, tabName) {
  var i, x, tablinks;
  x = document.getElementsByClassName("tab");
  for (i = 0; i < x.length; i++) {
    x[i].style.display = "none";
  }
  tablinks = document.getElementsByClassName("tablink");
  for (i = 0; i < tablinks.length; i++) {
    tablinks[i].className = tablinks[i].className.replace(" w3-theme-d1", "");
  }
  document.getElementById(tabName).style.display = "block";
  evt.currentTarget.className += " w3-theme-d1";
}
</script>
</body>
</html>
